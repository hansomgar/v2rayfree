# .github/workflows/sync-and-update-last.yml
name: Sync and Update Last

on:
  schedule:
    - cron: '0 */6 * * *'        # 每 6 小时运行一次
  workflow_dispatch:              # 支持手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout own repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream repository
        run: |
          git remote add upstream https://github.com/free-nodes/v2rayfree.git
          git fetch upstream
          git merge upstream/main --allow-unrelated-histories --no-edit -X theirs || {
            echo "Merge failed, please check conflicts manually."
            exit 1
          }

      - name: Find latest v20 file (by name descending) and copy to 'last'
        run: |
          # 仅查找根目录下的 v20* 文件（非子目录）
          shopt -s nullglob
          files=(v20*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No v20* files found in root directory, exiting."
            exit 1
          fi

          # 按文件名递减排序（字典序降序），取第一个
          IFS=$'\n' sorted=($(sort -r <<<"${files[*]}"))
          latest_file="${sorted[0]}"

          # 确保是普通文件（防止排序包含目录）
          if [ ! -f "$latest_file" ]; then
            echo "Selected item is not a regular file, exiting."
            exit 1
          fi

          echo "Latest file (by name descending): $latest_file"
          # 复制到根目录并强制覆盖
          cp -f "$latest_file" last
          git add last

      - name: Commit and push changes
        run: |
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update last file from latest v20* file [skip ci]"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/hansomgar/v2rayfree.git HEAD:main
          fi
